<!DOCTYPE html>
<html>

<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="styles/12-rock-paper-scissors.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>
    <button onclick="
            playGame('rock');
        " class="move-button"><img src="images/rock-emoji.png" class="move-icon" alt="Rock"></button>

    <button onclick="
            playGame('paper');
        " class="move-button"><img src="images/paper-emoji.png" class="move-icon" alt="Paper"></button>

    <button onclick="
           playGame('scissors');
        " class="move-button"><img src="images/scissors-emoji.png" class="move-icon" alt="Scissor"></button>

    <p class="js-result result"></p>
    <p class="js-moves move">
    </p>
    <p class="js-score score"></p>

    <button onclick="
        score = {
        wins : 0,
        losses : 0,
        ties : 0
        };
            localStorage.setItem('score',JSON.stringify(score));
            updateScoreElement();
        " class="reset-score-button">Reset Score</button>

    <button class="auto-play-button" onclick="
        autoPlay();
    ">Auto Play</button>

    <script src="scripts/12-rock-paper-scissors.js"></script>
</body>

</html>
